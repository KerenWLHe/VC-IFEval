# ============================================================
# VLM Constraint Eval - Unified Configuration
# Copy this file and fill in your paths/keys.
# Do NOT commit secrets.yaml to git.
# ============================================================

# ── Paths ────────────────────────────────────────────────────
paths:
  project_dir: "."                              # Root of the project
  image_dir: "data/sampled_images_50"           # Directory containing eval images
  input_tasks: "data/Eval/v3.jsonl"             # Input benchmark file (.json or .jsonl)
  output_dir: "eval_results"                    # Output root; subdirs created automatically

# ── Inference Model ──────────────────────────────────────────
inference:
  model_path: "/data/huggingface/hub/models--Qwen--Qwen2.5-VL-7B-Instruct/snapshots/cc594898137f460bfe9f0759e9844b3ce807cfb5"
  processor_path: null                          # If null, defaults to model_path
  model_name: "Qwen2.5-VL-7B-Instruct"         # Used for output directory naming
  bench_name: "v3"

  # Device
  cuda_device: "0"                              # CUDA_VISIBLE_DEVICES value (single GPU)
                                                # For multi-GPU, use torchrun instead

  # Generation params
  torch_dtype: "float32"                        # Options: float32 | bfloat16 | float16
  max_new_tokens: 512
  do_sample: true
  top_k: 50
  top_p: 0.9

  # Inference modes
  run_with_image: true                          # Run main inference with image
  run_without_image: true                       # Run auxiliary inference without image (for image influence scoring)

# ── Judge Model (GPT) ────────────────────────────────────────
judge:
  model_name: "gpt-4o-mini"
  temperature: 0
  max_tokens: 4096
  img_detail: "high"
  timeout: 300
  nproc: 8                                      # Parallel judge workers

  # API credentials — set via environment variables or secrets.yaml (never hardcode)
  # export OPENAI_API_KEY=sk-...
  # export OPENAI_API_BASE=https://...
  api_key_env: "OPENAI_API_KEY"
  api_base_env: "OPENAI_API_BASE"

# ── Scoring ──────────────────────────────────────────────────
scoring:
  max_retries: 10                               # Max retries for the outer score loop
  judge_retry: 5                                # Retries per individual GPT call
